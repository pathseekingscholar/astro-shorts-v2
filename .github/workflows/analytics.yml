name: Generate Shorts - Cinema Edition

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      preview:
        description: 'Run fast preview renders instead of full production renders'
        required: false
        default: false
        type: boolean

concurrency:
  group: astro-shorts-production
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg imagemagick fonts-dejavu wget
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/' \
            /etc/ImageMagick-6/policy.xml 2>/dev/null || true

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests Pillow numpy
          pip install moviepy==1.0.3
          pip install google-auth google-auth-oauthlib google-api-python-client

      - name: Install Node dependencies
        run: npm ci

      - name: Download Montserrat fonts
        run: |
          mkdir -p assets/fonts
          wget -q "https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-ExtraBold.ttf" \
            -O assets/fonts/Montserrat-ExtraBold.ttf || \
          wget -q "https://github.com/google/fonts/raw/main/ofl/montserrat/static/Montserrat-ExtraBold.ttf" \
            -O assets/fonts/Montserrat-ExtraBold.ttf || \
          echo "Montserrat ExtraBold download failed; using fallback fonts"
          wget -q "https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-Regular.ttf" \
            -O assets/fonts/Montserrat-Regular.ttf || true
          ls -la assets/fonts/ || true

      - name: Run analytics
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: python scripts/analytics_agent.py || echo "Analytics skipped"

      - name: Determine video count from strategy
        id: strategy
        run: |
          python - <<'PY'
          import json
          import os

          count = 1
          strategy_path = "data/strategy.json"
          if os.path.exists(strategy_path):
              try:
                  with open(strategy_path, "r", encoding="utf-8") as handle:
                      strategy = json.load(handle)
                  count = max(1, min(2, int(strategy.get("videos_per_run", 1))))
                  print(f"Strategy selected {count} video(s)")
              except Exception as exc:
                  print(f"Strategy read error: {exc}")
          else:
              print("No strategy file yet, defaulting to 1 video")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"count={count}\n")
          PY

      - name: Generate, format, and render videos
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          MUBERT_API_KEY: ${{ secrets.MUBERT_API_KEY }}
          SUNO_API_URL: ${{ secrets.SUNO_API_URL }}
          SUNO_COOKIE: ${{ secrets.SUNO_COOKIE }}
          VIDEO_COUNT: ${{ steps.strategy.outputs.count }}
        run: |
          set -euo pipefail
          COUNT=${VIDEO_COUNT:-1}
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.preview }}" = "true" ]; then
            RENDER_CMD="python scripts/render_video.py --preview"
            COUNT=1
          else
            RENDER_CMD="python scripts/render_video.py"
          fi

          echo "Generating $COUNT video(s)"
          for i in $(seq 1 "$COUNT"); do
            echo "Video $i / $COUNT"
            echo "Step: idea generation"
            python scripts/idea_generator.py
            echo "Step: script formatting"
            python scripts/script_formatter.py
            echo "Step: rendering"
            eval "$RENDER_CMD"
            sleep 2
          done

      - name: Upload rendered videos to YouTube
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.preview == true) }}
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          VIDEO_COUNT: ${{ steps.strategy.outputs.count }}
        run: |
          set -euo pipefail
          COUNT=${VIDEO_COUNT:-1}
          echo "Uploading $COUNT rendered video(s)"
          for i in $(seq 1 "$COUNT"); do
            echo "Step: YouTube upload $i / $COUNT"
            python scripts/youtube_uploader.py
            sleep 2
          done

      - name: Commit data and outputs
        if: ${{ success() }}
        continue-on-error: true
        run: |
          set -euo pipefail
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if git diff --quiet && git diff --staged --quiet; then
            echo "No repository changes to commit."
            exit 0
          fi
          git commit -m "Generated and uploaded new Short(s) | $(date +'%Y-%m-%d %H:%M')"
          git push || echo "Repository push failed after successful pipeline run"

      - name: Upload video artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: rendered-videos-${{ github.run_number }}
          path: videos_output/*.mp4
          retention-days: 7
