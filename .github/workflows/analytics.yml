name: Generate Shorts — Cinema Edition

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      preview:
        description: 'Run fast preview renders instead of full production renders'
        required: false
        default: false
        type: boolean

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg imagemagick fonts-dejavu wget
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/' \
            /etc/ImageMagick-6/policy.xml 2>/dev/null || true

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests Pillow numpy
          pip install moviepy==1.0.3
          pip install google-auth google-auth-oauthlib google-api-python-client

      - name: Download Montserrat fonts
        run: |
          mkdir -p assets/fonts
          # Download Montserrat ExtraBold from Google Fonts CDN
          wget -q "https://fonts.gstatic.com/s/montserrat/v26/JTUSjIg1_i6t8kCHKm459Wlhyw.woff2" \
            -O /tmp/montserrat_check.woff2 || true
          # Use direct TTF from GitHub mirror (reliable in CI)
          wget -q "https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-ExtraBold.ttf" \
            -O assets/fonts/Montserrat-ExtraBold.ttf || \
          wget -q "https://github.com/google/fonts/raw/main/ofl/montserrat/static/Montserrat-ExtraBold.ttf" \
            -O assets/fonts/Montserrat-ExtraBold.ttf || \
          echo "⚠️ Montserrat download failed, will use DejaVu fallback"
          wget -q "https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-Regular.ttf" \
            -O assets/fonts/Montserrat-Regular.ttf || true
          ls -la assets/fonts/ || true

      - name: Run analytics (learn from YouTube)
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: python scripts/analytics_agent.py || echo "⚠️ Analytics skipped"

      - name: Determine video count from strategy
        id: strategy
        run: |
          python - <<'EOF'
          import json, os
          count = 2
          sf = "data/strategy.json"
          if os.path.exists(sf):
              try:
                  with open(sf) as f:
                      s = json.load(f)
                  count = max(1, min(4, int(s.get("videos_per_run", 2))))
                  print(f"📊 Strategy: {count} video(s) this run")
              except Exception as e:
                  print(f"⚠️ Strategy read error: {e}")
          else:
              print("📊 No strategy yet, defaulting to 2")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"count={count}\n")
          EOF

      - name: Generate, render and upload videos
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          MUBERT_API_KEY: ${{ secrets.MUBERT_API_KEY }}
          SUNO_API_URL: ${{ secrets.SUNO_API_URL }}
          SUNO_COOKIE: ${{ secrets.SUNO_COOKIE }}
          VIDEO_COUNT: ${{ steps.strategy.outputs.count }}
        run: |
          COUNT=${VIDEO_COUNT:-2}
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.preview }}" = "true" ]; then
            RENDER_CMD="python scripts/video_renderer.py --preview"
          else
            RENDER_CMD="python scripts/video_renderer.py"
          fi
          echo "🎬 Generating $COUNT video(s)..."
          for i in $(seq 1 $COUNT); do
            echo ""
            echo "=========================================="
            echo "▶ Video $i / $COUNT"
            echo "=========================================="
            python scripts/idea_generator.py
            python scripts/script_formatter.py
            eval "$RENDER_CMD"
            python scripts/youtube_uploader.py
            sleep 8
          done

      - name: Commit data + outputs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "🚀 Generated + uploaded new Short(s) | $(date +'%Y-%m-%d %H:%M')" && \
            git push

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-videos-${{ github.run_number }}
          path: videos_output/*.mp4
          retention-days: 7
